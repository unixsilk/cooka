<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cooka - Recipes</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="recipes">
    <header class="site-header">
      <div class="brand">
        <a href="index.html" data-link="index.html" class="logo" data-i18n="site_name">Cooka</a>
      </div>
      <div class="header-actions">
        <nav class="nav">
          <a href="index.html" data-link="index.html" data-i18n="nav_home">Home</a>
          <a href="recipes.html" data-link="recipes.html" data-i18n="nav_recipes" class="active">Recipes</a>
        </nav>
        <div class="header-right">
          <button id="theme-toggle" class="nav-btn" type="button" aria-label="Switch theme">🎨</button>
          <div class="lang-switch">
          <select id="lang-select" aria-label="Language">
            <option value="de">🇨🇭</option>
            <option value="tr">🇹🇷</option>
            <option value="sq">🇦🇱</option>
          </select>
          </div>
        </div>
      </div>
    </header>

    <main class="content">
      <h1 class="page-title" data-i18n="recipes_title">Recipes</h1>
      <p class="muted" data-i18n="recipes_sub">Pick a recipe to view details.</p>
      <section class="filters is-collapsed" id="recipe-filters">
        <div class="filters-head">
          <label class="filter-field search-field">
            <span data-i18n="filter_search">Search</span>
            <input
              id="recipe-search"
              type="search"
              data-i18n-placeholder="filter_search_placeholder"
              placeholder="Search recipes"
            />
          </label>
          <div class="filters-head-actions">
            <span class="filter-summary" id="filter-summary"></span>
            <button class="filters-toggle" id="filter-toggle" type="button" data-i18n="filter_toggle">Filter</button>
          </div>
        </div>
        <div class="filters-body" id="filters-body">
          <div class="filter-row">
          <label class="filter-field">
            <span data-i18n="filter_meal">Meal</span>
            <select id="filter-meal"></select>
          </label>
          <label class="filter-field">
            <span data-i18n="filter_cuisine">Cuisine</span>
            <select id="filter-cuisine"></select>
          </label>
          <label class="filter-field">
            <span data-i18n="filter_diet">Diet</span>
            <select id="filter-diet"></select>
          </label>
          <label class="filter-field">
            <span data-i18n="filter_category">Category</span>
            <select id="filter-category"></select>
          </label>
          <label class="filter-field">
            <span data-i18n="filter_time">Time</span>
            <select id="filter-time"></select>
          </label>
          <label class="filter-field">
            <span data-i18n="filter_difficulty">Difficulty</span>
            <select id="filter-difficulty"></select>
          </label>
          <label class="filter-field">
            <span data-i18n="filter_ingredient">Ingredient</span>
            <input
              id="filter-ingredient"
              type="search"
              data-i18n-placeholder="filter_ingredient_placeholder"
              placeholder="z. B. Erdbeeren"
            />
            <div class="filter-suggest" id="ingredient-suggest" role="listbox" aria-label="Ingredient suggestions"></div>
          </label>
          </div>
          <div class="filter-actions">
          <button class="button ghost" id="filter-clear" type="button" data-i18n="filter_clear">Clear</button>
          <span class="filter-count" id="filter-count"></span>
          </div>
        </div>
      </section>
      <div id="recipe-list" class="grid"></div>
      <div id="data-note" class="note"></div>
    </main>

    <footer class="site-footer">
      <span data-i18n="footer_brand">Cooka</span>
      <span data-i18n="footer_note">Built for GitHub Pages + Supabase</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/data.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
